# ... site_name, site_author, etc.

# 网站图标配置
logo: assets/logo.png
favicon: assets/logo.png

# ... theme and font
theme:
  name: material
  # ...
  palette:
    # 浅色模式 (类似报纸的白底黑字)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: black
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
nav:
  - 首页 / HOME: index.md
  # ...